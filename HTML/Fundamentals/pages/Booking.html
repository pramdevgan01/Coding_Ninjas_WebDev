<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
</head>
<body>
    <h1>Schedule Your Holiday on Paradise Island</h1>
    <form action="">
        <fieldset>
            <legend>Personal Information</legend>
        <label for="name">Full Name</label>
        <input type="text" name="name" id="fullname" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>
        <br> 
        <label for="phnumber">Phone Number:</label>
        <input type="tel" name="phnumber" id="phnumber" required>
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="dob" id="dob" min="2021-01-01" max="2026-04-5" placeholder="Enter Your Date of Birth">
        <br>
        </fieldset>
        <fieldset>
            <legend>Trip Details</legend>
        <label for="arrival">Arrival:</label>
        <input type="datetime-local" name="arrival" id="arrival">
        <br>
        <label for="departure">Departure:</label>
        <input type="datetime-local" name="departure" id="departure">
        <br> 
        <label for="traveler">No of Traveler:</label>
        <input type="number" name="traveler id="traveler">

        <p><b>Baby on Board</b></p>
        <input type="radio" name="onBoard" id="onBoard" value="Yes">
        <label for="">Yes</label> <br>
        <input type="radio" name="onBoard" id="onBoard" value="No" checked>
        <label for="">No</label>
        <br>
        <label for="pref">Accomodation Preferences</label>
        <select name="accomodation" id="pref" multiple>
            <optgroup label="Hotels">
                <option value="3-Star">3 Star</option>
                <option value="3-Star">4 Star</option>
                <option value="3-Star">5 Star</option>
            </optgroup>
            <!-- <option value="hotel">Hotel</option> -->
            <option value="resort">Resort</option>
            <option value="Guest House">Guest House</option>
            <option value="Villa" selected>Villa</option>
        </select>


        <fieldset>
        <legend>Preferred Activities</legend>
        <label for="Snorkelling">Snorkelling</label>
        <input type="checkbox" name="Snorkelling" id="Snorkelling" name="activitiy" value="Snorkelling">
        <br>
        <label for="Hiking">Hiking</label>
        <input type="checkbox" name="Hiking" id="Hiking" name="activitiy" value="Hiking" checked>
        <br>
        <label for="Spa">Spa</label>
        <input type="checkbox" name="Spa" id="Spa" name="activitiy" value="Spa">
        </fieldset>
       <p><b>Special Request</b></p>
       <textarea name="sprequest" id="sprequest" cols="40" rows="10"></textarea>
        </fieldset>
        <br><br>
        <input type="submit" value="submit">
        <input type="reset"/>
        <input type="button" value="Button"/>

        <button type="button">
            <img src="../multimeida/up-arrow.png" alt="up-arrow" srcset="" width="10" height="10">
        </button>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
