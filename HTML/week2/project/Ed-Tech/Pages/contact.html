    <article>
        <section id="contact-details">
            <h2>Contact Details</h2>
            <p>For inquiries, you can reach us via email or phone</p>
            <p>Email: <a href="mailto:contact@codingninjas.com">contact@codingninjas.com</a></p>
            <p>Phone: <a href="tel:+1800-1233598">1800-1233598</a></p>
        </section>
        <hr>
        <section id="map">
            <h2>Location Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d112259.44058016017!2d76.89918609726563!3d28.4461751!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390d03d1c62ba76b%3A0xec4dbad7537d963b!2sCoding%20Ninjas!5e0!3m2!1sen!2sin!4v1775837260847!5m2!1sen!2sin"

            </iframe>
        </section>
        <hr>
        <section id="feedback">
            <form action="#" method="post">
                <fieldset>
                    <legend><b>Feedback Form</b></legend>
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name" required> <br><br>

                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" required> <br><br>

                    <label for="subject">Subject:</label>
                    <input type="text" name="subject" id="subject" required> <br><br>

                    <label for="message">Message:</label>
                    <textarea name="message" id="message" cols="20" rows="5" required></textarea><br><br>
                    <button type="submit">Submit</button>
                </fieldset>
            </form>
        </section>
    </article>
