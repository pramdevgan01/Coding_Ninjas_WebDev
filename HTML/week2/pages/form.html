<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
</head>
<body>
     <h1>Plase schedule your trip</h1>
    <form action="success.html" method="post">
        <label for="username">Username:</label> 
       <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter Username" 
        required/>
       <br>
       <label for="password">Password</label>
       <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter Password" 
            required 
            minlength="6" 
            maxlength="16" 
        size="20"/>
       <br><br>
       <input type="submit"/>
    </form>
</body>
</html>
